<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>横須賀市役所 部署タイプ診断</title>
<style>
/* ── 01-tokens.css ── */
:root {
  /* ── Axis colors: dark (text) / mid (fills) / tint (backgrounds) ── */
  --A:      #C0392B; --A-mid: #E8534A; --A-tint: #FFF0EE;
  --B:      #2E6DB4; --B-mid: #4A90D9; --B-tint: #EBF3FC;
  --C:      #1E7345; --C-mid: #4CAF7D; --C-tint: #ECF8F1;
  --D:      #7B3F9E; --D-mid: #9B59B6; --D-tint: #F5EDF8;
  --E:      #9C6310; --E-mid: #F5A623; --E-tint: #FFF6E6;

  /* ── Brand anchor ── */
  --hall-indigo:  #1C2340;
  --hall-indigo-hover: #2A3558;

  /* ── Neutrals ── */
  --bg:           #F0F2F7;
  --card:         #FFFFFF;
  --text:         var(--hall-indigo);
  --text-sec:     #4A5568;
  --sub:          #6B7280;
  --border:       #E4E7ED;
  --border-light: #F0F2F7;

  /* ── Focus ── */
  --focus-ring:   #2E6DB4;

  /* ── Wash & tint ── */
  --hover-wash:        #FAFBFC;
  --hover-wash-list:   #F6F7FB;
  --indigo-tint:       #DCE4F8;  /* selected list row */
  --indigo-tint-soft:  #F0F3FF;  /* trait active highlight */

  /* ── Typography ── */
  --font: 'Hiragino Sans','Hiragino Kaku Gothic ProN','BIZ UDPGothic',
          Meiryo,-apple-system,sans-serif;
  --fw-normal:  400;
  --fw-medium:  500;
  --fw-bold:    700;
  --fw-black:   800; /* numerals & short labels ONLY */
  --lh-body:    1.75;
  --lh-tight:   1.3;
  --fs-xs:  12px;
  --fs-sm:  14px;
  --fs-base: 16px;
  --fs-lg:  20px;
  --fs-xl:  24px;
  --fs-2xl: 30px;

  /* ── Spacing ── */
  --sp-xs: 4px;  --sp-sm: 8px;  --sp-md: 16px;
  --sp-lg: 24px; --sp-xl: 32px; --sp-2xl: 48px;

  /* ── Layout ── */
  --app-max:     1040px;
  --content-max: 640px;
  --card-pad:    28px;
  --card-r:      16px;
  --card-shadow: 0 2px 20px rgba(0,0,0,0.08);

  /* ── Data vis ── */
  --bar-h:     12px;
  --mkr-size:  16px;
  --mkr-user:  13px;
}


/* ── 02-reset.css ── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: var(--fs-base);
  line-height: var(--lh-body);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}


/* ── 03-layout.css ── */
body {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#app {
  width: 100%;
  max-width: var(--app-max);
  padding: 0 var(--sp-lg) var(--sp-2xl);
}

.content-w {
  max-width: var(--content-max);
  margin-left: auto;
  margin-right: auto;
}

.card {
  background: var(--card);
  border-radius: var(--card-r);
  padding: var(--card-pad);
  box-shadow: var(--card-shadow);
}

.section-gap { margin-top: var(--sp-lg); }


/* ── 04-welcome.css ── */
/* ── Welcome header ── */
.w-header {
  background: var(--hall-indigo);
  color: white;
  padding: 56px var(--sp-xl) 48px;
  text-align: center;
  border-radius: 0 0 28px 28px;
  margin-bottom: var(--sp-lg);
}
.w-city {
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  letter-spacing: .12em;
  opacity: .6;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.w-title {
  font-size: var(--fs-2xl);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  margin-bottom: var(--sp-md);
}
.w-sub {
  font-size: 14px;
  opacity: .78;
  line-height: var(--lh-body);
}

/* ── Axis pills ── */
.axis-pills { display: flex; gap: var(--sp-sm); flex-wrap: wrap; margin-bottom: var(--sp-lg); }
.apill {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
}
@media (prefers-reduced-motion: no-preference) {
  @keyframes pill-rise {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .apill { animation: pill-rise 360ms cubic-bezier(0.22, 1, 0.36, 1) backwards; }
  .apill:nth-child(1) { animation-delay:  60ms; }
  .apill:nth-child(2) { animation-delay: 120ms; }
  .apill:nth-child(3) { animation-delay: 180ms; }
  .apill:nth-child(4) { animation-delay: 240ms; }
  .apill:nth-child(5) { animation-delay: 300ms; }
}

/* ── Stats grid ── */
.w-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-sm);
  margin: var(--sp-lg) 0;
}
.stat { text-align: center; }
.stat-n { font-size: var(--fs-2xl); font-weight: var(--fw-black); line-height: 1; }
.stat-l {
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  color: var(--sub);
  margin-top: 6px;
}

/* ── Intro paragraph ── */
.w-intro {
  font-size: var(--fs-sm);
  line-height: var(--lh-body);
  color: var(--text-sec);
  margin-bottom: var(--sp-md);
}

/* ── How it works ── */
.w-steps {
  display: flex;
  flex-direction: column;
  gap: var(--sp-sm);
  margin-bottom: var(--sp-lg);
  padding: var(--sp-md);
  background: var(--bg);
  border-radius: 12px;
}
.w-step {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: var(--fs-sm);
  color: var(--text-sec);
  line-height: 1.5;
}
.w-step-num {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--text);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--fs-xs);
  font-weight: var(--fw-black);
}

/* ── CTA ── */
.btn-start {
  display: block; width: 100%;
  padding: 18px;
  border: none; border-radius: 14px;
  background: var(--hall-indigo);
  color: white;
  font-size: var(--fs-base);
  font-weight: var(--fw-bold);
  cursor: pointer;
  transition: opacity .15s ease-out, transform .15s ease-out;
  letter-spacing: .02em;
}
.btn-start:hover { opacity: .88; transform: translateY(-1px); }
.btn-start:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 3px;
}
@media (prefers-reduced-motion: reduce) {
  .btn-start { transition: opacity .15s ease-out; }
  .btn-start:hover { transform: none; }
}


/* ── 05-quiz.css ── */
/* ── Progress bar ── */
.prog-wrap { padding: 20px 0 var(--sp-md); }
.prog-bar { display: flex; gap: 3px; }
.seg {
  flex: 1; height: 6px; border-radius: 999px;
  background: var(--border);
  transition: background .25s;
}
.seg.done { background: var(--c); }
.seg.cur  { background: var(--c); opacity: .4; }

/* ── Meta row ── */
.quiz-meta {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-lg);
}
.q-num {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: var(--fs-sm);
  color: var(--sub);
  font-weight: var(--fw-bold);
}
.q-num > span:not(.q-flourish) { color: var(--border); }
.q-flourish {
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  letter-spacing: .04em;
  color: var(--text);
  background: var(--indigo-tint-soft);
  padding: 3px 10px;
  border-radius: 999px;
  white-space: nowrap;
}
@media (prefers-reduced-motion: no-preference) {
  @keyframes flourish-in {
    from { opacity: 0; transform: translateY(-2px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .q-flourish { animation: flourish-in 320ms cubic-bezier(0.22, 1, 0.36, 1) backwards; animation-delay: 120ms; }
}
.axis-tag {
  display: inline-flex; align-items: center;
  font-size: var(--fs-xs); font-weight: var(--fw-bold);
  padding: 6px 14px; border-radius: 999px;
}

/* ── Scenario (hero question) ── */
.scenario {
  text-align: center;
  padding: var(--sp-xl) var(--sp-md);
  margin-bottom: var(--sp-lg);
  font-size: var(--fs-xl);
  line-height: 1.7;
  font-weight: var(--fw-bold);
}

/* ── Options ── */
.opts-label {
  font-size: var(--fs-xs); color: var(--sub);
  font-weight: var(--fw-bold);
  margin-bottom: 10px;
  letter-spacing: .04em;
}
.opt {
  display: block; width: 100%;
  padding: var(--sp-md) 20px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: var(--fs-base);
  font-weight: var(--fw-medium);
  text-align: left;
  cursor: pointer;
  margin-bottom: var(--sp-sm);
  transition: border-color .12s ease-out, background .12s ease-out;
  color: var(--text);
  line-height: 1.5;
  min-height: 48px;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.opt:hover { border-color: #b0b4be; background: var(--hover-wash); }
.opt:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}
.opt-num { font-weight: var(--fw-bold); margin-right: 10px; }

/* ── Back button ── */
.btn-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 20px;
  border: 2px solid var(--border);
  background: white; border-radius: 10px;
  font-size: 14px; font-weight: var(--fw-medium);
  cursor: pointer; color: var(--sub);
  margin-top: var(--sp-sm);
  transition: border-color .12s;
  min-height: 44px;
}
.btn-back:hover { border-color: #aaa; color: var(--text); }
.btn-back:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}

.quiz-content {
  max-width: var(--content-max);
  margin: 0 auto;
}


/* ── 06-results-type.css ── */
/* ── Type reveal banner ── */
.type-banner {
  background: var(--hall-indigo);
  color: white;
  padding: var(--sp-2xl) var(--sp-xl);
  text-align: center;
  border-radius: 0 0 28px 28px;
  margin-bottom: var(--sp-lg);
}

@media (prefers-reduced-motion: no-preference) {
  @keyframes type-rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: var(--enter-final-opacity, 1); transform: translateY(0); }
  }
  @keyframes chip-pop {
    from { opacity: 0; transform: translateY(6px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .type-pre   { animation: type-rise 380ms cubic-bezier(0.22, 1, 0.36, 1) backwards;
                animation-delay: 80ms; --enter-final-opacity: .6; }
  .type-chip  { animation: chip-pop  420ms cubic-bezier(0.22, 1, 0.36, 1) backwards; }
  .type-chip:nth-child(1) { animation-delay: 200ms; }
  .type-chip:nth-child(2) { animation-delay: 280ms; }
  .type-chip:nth-child(3) { animation-delay: 360ms; }
  .type-chip:nth-child(4) { animation-delay: 440ms; }
  .type-chip:nth-child(5) { animation-delay: 520ms; }
  .type-name  { animation: type-rise 480ms cubic-bezier(0.22, 1, 0.36, 1) backwards;
                animation-delay: 640ms; }
  .type-code  { animation: type-rise 380ms cubic-bezier(0.22, 1, 0.36, 1) backwards;
                animation-delay: 760ms; --enter-final-opacity: .5; }
  .type-desc  { animation: type-rise 460ms cubic-bezier(0.22, 1, 0.36, 1) backwards;
                animation-delay: 860ms; --enter-final-opacity: .82; }
}
.type-pre {
  font-size: var(--fs-sm);
  opacity: .6;
  letter-spacing: .12em;
  margin-bottom: var(--sp-md);
}
.type-chips {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: var(--sp-lg);
}
.type-chip {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--fs-lg);
  font-weight: var(--fw-bold);
}
.type-name {
  font-size: var(--fs-2xl);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  margin-bottom: var(--sp-xs);
}
.type-code {
  font-size: var(--fs-sm);
  opacity: .5;
  margin-bottom: var(--sp-md);
}
.type-desc {
  font-size: var(--fs-base);
  opacity: .82;
  line-height: var(--lh-body);
  max-width: 480px;
  margin: 0 auto;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* ── 07-results-axes.css ── */
/* ── Traits two-column grid ── */
.traits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-md);
  align-items: stretch;
}
@media (min-width: 840px) {
  .traits-grid {
    grid-template-columns: 300px 1fr;
  }
}

/* ── Carousel description (left) ── */
.tc-panel {
  padding: var(--sp-lg);
  display: flex;
  flex-direction: column;
}

/* Title */
.tc-axis-label {
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  color: var(--sub);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: var(--sp-md);
}

/* Hero kanji + winning trait */
.tc-hero {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  margin-bottom: var(--sp-md);
}
.tc-kanji {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--fs-xl);
  font-weight: var(--fw-black);
  flex-shrink: 0;
}
.tc-win {
  font-size: var(--fs-lg);
  font-weight: var(--fw-bold);
}

/* Bar */
.tc-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: var(--sp-md);
}
.tc-end {
  font-size: var(--fs-xs);
  color: var(--sub);
  flex-shrink: 0;
}
.tc-track {
  position: relative;
  flex: 1;
  height: 10px;
  border-radius: 999px;
  overflow: visible;
}
.tc-marker {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 16px; height: 16px;
  border-radius: 50%;
  background: white;
  border: 2.5px solid;
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
  z-index: 2;
}

/* Description */
.tc-desc {
  font-size: var(--fs-sm);
  line-height: var(--lh-body);
  color: var(--text-sec);
  flex: 1;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* Nav row at bottom */
.tc-nav-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: var(--sp-md);
}
.tc-nav {
  width: 28px; height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: white;
  font-size: 16px;
  line-height: 1;
  color: var(--sub);
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, color .15s;
}
.tc-nav:hover { border-color: #aaa; color: var(--text); }
.tc-nav:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}
.tc-dots {
  display: flex;
  gap: 6px;
}
.tc-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: background .2s, transform .2s;
}
.tc-dot--on {
  transform: scale(1.3);
}

/* ── 5-bar panel (right) ── */
.bars-panel {
  padding: var(--sp-md) var(--sp-lg);
}
.trait {
  display: block;
  width: 100%;
  padding: var(--sp-sm);
  background: var(--card);
  border: none;
  border-bottom: 1px solid var(--border);
  border-radius: 6px;
  font: inherit;
  color: inherit;
  text-align: left;
  cursor: pointer;
  transition: background .15s ease-out;
}
.trait:last-child { border-bottom: none; }
.trait:hover { background: var(--hover-wash); }
.trait:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}
.trait--active {
  background: var(--indigo-tint-soft);
  border-bottom-color: transparent;
}

.trait-header {
  display: flex;
  align-items: baseline;
  gap: var(--sp-sm);
  margin-bottom: 4px;
}
.trait-pct {
  font-size: var(--fs-base);
  font-weight: var(--fw-black);
}
.trait-win {
  font-size: var(--fs-sm);
  font-weight: var(--fw-bold);
}

/* ── Bar ── */
.trait-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.trait-end {
  font-size: var(--fs-xs);
  color: var(--sub);
  width: 40px;
  flex-shrink: 0;
  text-align: center;
}
.trait-track {
  position: relative;
  flex: 1;
  height: var(--bar-h);
  border-radius: 999px;
  overflow: visible;
}
.trait-dot {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 16px; height: 16px;
  border-radius: 50%;
  background: white;
  border: 2.5px solid;
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
  z-index: 2;
}


/* ── 08-results-match.css ── */
/* ── Match section ── */
.match-section-title {
  font-size: var(--fs-lg);
  font-weight: var(--fw-bold);
  margin-bottom: 4px;
}
.match-section-sub {
  font-size: var(--fs-sm);
  color: var(--sub);
  margin-bottom: var(--sp-md);
}

/* ── Side-by-side grid ── */
.match-browse {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-md);
  align-items: stretch;
}
@media (min-width: 840px) {
  .match-browse {
    grid-template-columns: 300px 1fr;
  }
}

.all-list--side {
  overflow-y: auto;
  background: var(--card);
  border-radius: var(--card-r);
  box-shadow: var(--card-shadow);
}

/* ── Match card ── */

/* ── Header row: fit + info ── */
.match-top {
  display: flex;
  align-items: center;
  gap: var(--sp-xl);
  padding-bottom: var(--sp-lg);
  border-bottom: 1px solid var(--border);
  margin-bottom: var(--sp-lg);
}

/* ── Fit display: arc + number side by side ── */
.fit-display {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.fit-arc {
  width: 56px; height: 56px;
  flex-shrink: 0;
}
.fit-text {
  display: flex;
  flex-direction: column;
}
.fit-pct {
  font-size: 28px;
  font-weight: var(--fw-black);
  line-height: 1;
}
.fit-lbl {
  font-size: var(--fs-xs);
  color: var(--sub);
  font-weight: var(--fw-bold);
  letter-spacing: .06em;
  margin-top: 2px;
}
.div-dept { font-size: var(--fs-xs); color: var(--sub); margin-bottom: 2px; }
.div-name {
  font-size: var(--fs-xl); font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  word-break: keep-all; overflow-wrap: break-word;
  margin-bottom: var(--sp-sm);
}
.div-about {
  font-size: var(--fs-sm);
  line-height: var(--lh-body);
  color: var(--text-sec);
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* ── Comparison breakdown ── */
.comp-label {
  font-size: var(--fs-sm);
  font-weight: var(--fw-bold);
  color: var(--sub);
  margin-bottom: var(--sp-md);
}

.comp-row { margin-bottom: 20px; }
.comp-row:last-of-type { margin-bottom: 0; }
.comp-axis {
  font-size: var(--fs-sm);
  font-weight: var(--fw-bold);
  margin-bottom: 6px;
}
.comp-pair { display: flex; align-items: center; gap: 8px; margin-bottom: var(--sp-xs); }
.comp-who {
  font-size: var(--fs-xs);
  color: var(--sub);
  width: 40px; flex-shrink: 0;
  text-align: right;

function getAxisDesc(axis, score) {
  const d = AXIS_DESC[axis];
  if (score >= 1.0)   return d.strong_plus;
  if (score >= 0.25)  return d.mild_plus;
  if (score > -0.25)  return d.neutral;
  if (score > -1.0)   return d.mild_minus;
  return d.strong_minus;
}

/* ── 03-algorithm.js ── */
/* ═══════════════════════ ALGORITHM ═══════════════════════ */

const AX = ['A','B','C','D','E'];
const MAX_D = Math.sqrt(5 * 16); // sqrt(80) ≈ 8.944
const QMAP = {};
QUESTIONS.forEach(q => QMAP[q.id] = q);

function scoreResp(r, rev) {
  const v = r - 3;
  return rev ? -v : v;
}

function axisScores(resp) {
  const s = { A:[], B:[], C:[], D:[], E:[] };
  for (const [id, r] of Object.entries(resp)) {
    const q = QMAP[id];
    s[q.axis].push(scoreResp(r, q.reversed));
  }
  const o = {};
  for (const ax of AX) {
    const a = s[ax];
    o[ax] = a.length ? a.reduce((x, y) => x + y, 0) / a.length : 0;
  }
  return o;
}

function dist(u, d) {
  return Math.sqrt(AX.reduce((s, ax) => s + (u[ax] - d[ax]) ** 2, 0));
}

function fitPct(d) {
  return Math.round((1 - d / MAX_D) * 1000) / 10;
}

function rankAll(resp) {
  const u = axisScores(resp);
  return DIVISIONS
    .map(d => ({ ...d, user: u, fit: fitPct(dist(u, d)) }))
    .sort((a, b) => b.fit - a.fit);
}

function determineType(userScores) {
  const code = AX.map(ax => {
    return userScores[ax] >= 0 ? AXES[ax].letter_plus : AXES[ax].letter_minus;
  }).join('');
  const t = TYPES[code] || { name: '探究者', desc: 'あなたは独自のバランス感覚を持つタイプです。' };
  return { code, ...t };
}

let S = {
  screen: 'welcome',
  step: 0,
  resp: {},
  results: [],
  sel: 0,
  showAll: false,
  traitIdx: 0, // carousel index 0-4
  type: null,       // { code, name, desc }
  userScores: null,  // { A, B, C, D, E }
};

/* ── Share via URL ── */
function encodeResponses(resp) {
  return ORDER.map(id => resp[id] || 3).join('');
}

function decodeResponses(str) {
  const resp = {};
  ORDER.forEach((id, i) => { resp[id] = parseInt(str[i]) || 3; });
  return resp;
}

function getShareUrl() {
  const encoded = encodeResponses(S.resp);
  const url = new URL(window.location.href);
  url.hash = '';
  url.searchParams.set('r', encoded);
  return url.toString();
}

function restoreFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const r = params.get('r');
  if (r && r.length === ORDER.length && /^[1-5]+$/.test(r)) {
    S.resp = decodeResponses(r);
    S.results = rankAll(S.resp);
    S.userScores = S.results[0].user;
    S.type = determineType(S.userScores);
    S.sel = 0;
    S.screen = 'results';
    return true;
  }
  return false;
}

function go(action, payload) {
  switch (action) {
    case 'START':
      S.screen = 'quiz'; S.step = 0; S.resp = {};
      break;
    case 'ANSWER':
      S.resp[ORDER[S.step]] = payload;
      if (S.step < ORDER.length - 1) {
        S.step++;
      } else {
        S.results = rankAll(S.resp);
        S.userScores = S.results[0].user;
        S.type = determineType(S.userScores);
        S.sel = 0;
        S.showAll = false;
        S.screen = 'results';
        history.replaceState(null, '', getShareUrl());
      }
      break;
    case 'BACK':
      if (S.step > 0) S.step--;
      break;
    case 'SEL':
      S.sel = payload;
      patchSel();
      return;
    case 'TALL':
      S.showAll = !S.showAll;
      break;
    case 'TPREV':
      S.traitIdx = (S.traitIdx + 4) % 5;
      patchTrait();
      return;
    case 'TNEXT':
      S.traitIdx = (S.traitIdx + 1) % 5;
      patchTrait();
      return;
    case 'TAXS':
      S.traitIdx = AX.indexOf(payload);
      patchTrait();
      return;
    case 'SHARE': {
      const btn = document.querySelector('.btn-share');
      if (btn && btn.disabled) return; // Block double-fire while sharing
      const url = getShareUrl();
      const flash = (msg) => {
        if (!btn) return;
        const orig = '結果をシェアする';
        btn.disabled = true;
        btn.textContent = msg;
        setTimeout(() => {
          btn.textContent = orig;
          btn.disabled = false;
        }, 2000);
      };
      if (navigator.share) {
        navigator.share({ title: '横須賀市 課 相性診断', url })
          .catch(() => { /* user dismissed share sheet — nothing to do */ });
      } else if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(url)
          .then(() => flash('コピーしました'))
          .catch(() => flash('コピーできませんでした'));
      } else {
        flash('コピーできませんでした');
      }
      return;
    }
    case 'RETAKE':
      S.screen = 'welcome'; S.step = 0; S.resp = {};
      S.results = []; S.type = null; S.userScores = null;
      history.replaceState(null, '', window.location.pathname);
      break;
  }
  render();
}

function fitColor(p) {
  if (p >= 80) return { text: '#1E7345', fill: '#4CAF7D', bg: '#ECF8F1' };
  if (p >= 60) return { text: '#2E6DB4', fill: '#4A90D9', bg: '#EBF3FC' };
  if (p >= 45) return { text: '#9C6310', fill: '#F5A623', bg: '#FFF6E6' };
  return { text: '#C0392B', fill: '#E8534A', bg: '#FFF0EE' };
}

function ring(pct, fc) {
  const r = 24, c = 2 * Math.PI * r, f = (pct / 100) * c;
  return `<div class="fit-display">
    <div class="fit-arc">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="${r}" fill="none" stroke="#E4E7ED" stroke-width="6"/>
        <circle cx="28" cy="28" r="${r}" fill="none" stroke="${fc.fill}" stroke-width="6"
          stroke-dasharray="${f} ${c}" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:center"/>
      </svg>
    </div>
    <div class="fit-text">
      <span class="fit-pct" style="color:${fc.text}">${pct}%</span>
      <span class="fit-lbl">相性度</span>
    </div>
  </div>`;
}

/* ── Score → percentage (always ≥50, winning side) ── */
function scoreToPct(score) {
  const isPlus = score >= 0;
  const pct = Math.round(50 + (Math.abs(score) / 2) * 50);
  return { pct, isPlus };
}

/* ── Trait bar (compact, for 5-bar panel) ── */
function traitBar(ax, score, active) {
  const a = AXES[ax];
  const { pct, isPlus } = scoreToPct(score);
  const winLabel = isPlus ? a.plus : a.minus;
  const dotLeft = ((score + 2) / 4 * 100).toFixed(0);

  return `
  <button type="button" class="trait${active ? ' trait--active' : ''}" onclick="go('TAXS','${ax}')" aria-pressed="${active}">
    <div class="trait-header">
      <span class="trait-pct" style="color:${a.dark}">${pct}%</span>
      <span class="trait-win" style="color:${a.dark}">${winLabel}</span>
    </div>
    <div class="trait-bar-row">
      <span class="trait-end">${a.kanji_minus}</span>
      <div class="trait-track" style="background:${a.color}">
        <div class="trait-dot" style="left:${dotLeft}%;border-color:${a.dark}"></div>
      </div>
      <span class="trait-end">${a.kanji_plus}</span>
    </div>
  </button>`;
}

      <span class="comp-who">この課</span>
      <div class="comp-track comp-track--div" style="background:${a.color}">
        <div class="comp-dot" style="left:${dPct}%;border-color:${a.dark}"></div>
      </div>
    </div>
    <div class="comp-ends"><span>${a.minus}</span><span>${a.plus}</span></div>
  </div>`;
}


/* ── 06-screen-welcome.js ── */
/* ═══════════════════════ WELCOME ═══════════════════════ */

function renderWelcome() {
  const pills = Object.entries(AXES).map(([k, v]) =>
    `<span class="apill" style="background:${v.tint};color:${v.dark}">${v.label}</span>`
  ).join('');

  return `
  <div class="w-header">
    <div class="w-city">Yokosuka City Hall</div>
    <h1 class="w-title">横須賀市役所<br>部署タイプ診断</h1>
    <p class="w-sub">20の質問に答えるだけで、<br>あなたにぴったりの課が見つかります</p>
  </div>
  <div class="card">
    <div class="axis-pills">${pills}</div>
    <p class="w-intro">
      5つの視点からあなたの「働き方タイプ」を診断し、全102課の中から相性の高い部署をランキングでご紹介します。
    </p>
    <div class="w-steps">
      <div class="w-step">
        <span class="w-step-num">1</span>
        <span>20の仕事場面に、あなたがどう感じるか回答</span>
      </div>
      <div class="w-step">
        <span class="w-step-num">2</span>
        <span>5つの軸であなたの「働き方タイプ」を診断</span>
      </div>
      <div class="w-step">
        <span class="w-step-num">3</span>
        <span>全102課との相性をランキングで発表！</span>
      </div>
    </div>
    <div class="w-stats">
      <div class="stat"><div class="stat-n">20</div><div class="stat-l">質問数</div></div>
      <div class="stat"><div class="stat-n">5</div><div class="stat-l">診断軸</div></div>
      <div class="stat"><div class="stat-n">102</div><div class="stat-l">対象の課</div></div>
    </div>
    <button class="btn-start" onclick="go('START')">診断をはじめる →</button>
  </div>`;
}


/* ── 07-screen-quiz.js ── */
/* ═══════════════════════ QUIZ ═══════════════════════ */

function renderQuiz() {
  const qid = ORDER[S.step];
  const q = QMAP[qid];
  const ax = AXES[q.axis];

  const segs = ORDER.map((id, i) => {
    const c = AXES[QMAP[id].axis].color;
    let cls = 'seg';
    if (i < S.step) cls += ' done';
    else if (i === S.step) cls += ' cur';
    return `<div class="${cls}" style="--c:${c}"></div>`;
  }).join('');

  const prev = S.resp[qid];
  const opts = q.options.map((o, i) => {
    const selected = prev === (i + 1) ? ' style="border-color:' + ax.dark + ';background:' + ax.tint + '"' : '';
    return `<button class="opt"${selected} onclick="go('ANSWER',${i + 1})">
      <span class="opt-num" style="color:${ax.dark}">${i + 1}</span>${o}
    </button>`;
  }).join('');

  const back = S.step > 0
    ? `<button class="btn-back" onclick="go('BACK')">← 戻る</button>`
    : '';

  const total = ORDER.length;
  const remaining = total - S.step - 1;
  let flourish = '';
  if (S.step === 0) flourish = 'ゆっくり考えて大丈夫です';
  else if (remaining === 1) flourish = 'あと2問';
  else if (remaining === 0) flourish = 'ラスト1問！';

  return `
  <div class="quiz-content">
    <div class="prog-wrap">
      <div
        class="prog-bar"
        role="progressbar"
        aria-valuemin="1"
        aria-valuemax="${ORDER.length}"
        aria-valuenow="${S.step + 1}"
        aria-label="進捗 ${S.step + 1} / ${ORDER.length}"
      >${segs}</div>
    </div>
    <div class="quiz-meta">
      <span class="q-num">Q.${S.step + 1} <span aria-hidden="true">/</span> ${ORDER.length}${flourish ? `<span class="q-flourish">${flourish}</span>` : ''}</span>
      <span class="axis-tag" style="background:${ax.tint};color:${ax.dark}">${ax.label}</span>
    </div>
    <h1 class="scenario" style="color:${ax.dark}">${q.scenario}</h1>
    <p class="opts-label" id="opts-label-${S.step}">この場面、あなたにはどのくらい合っていますか？</p>
    <div role="group" aria-labelledby="opts-label-${S.step}">${opts}</div>
    ${back}
  </div>`;
}


/* ── 08-screen-results.js ── */
/* ═══════════════════════ RESULTS ═══════════════════════ */

const TOP_N = 5;

/* ── Section 1: Type banner (full-width reveal) ── */
function renderTypeReveal() {
  const t = S.type;
  const u = S.userScores;
  const chips = AX.map(ax => {
    const a = AXES[ax];
    const kanji = u[ax] >= 0 ? a.kanji_plus : a.kanji_minus;
    return `<div class="type-chip" style="background:${a.tint};color:${a.dark}">${kanji}</div>`;
  }).join('');

  return `
  <div class="type-banner">
    <div class="type-pre">あなたのタイプ</div>
    <div class="type-chips">${chips}</div>
    <h1 class="type-name">「${t.name}」型</h1>
    <div class="type-code">${t.code}</div>
    <div class="type-desc">${t.desc}</div>
  </div>`;
}

/* ── Section 2: Traits (carousel desc + 5-bar panel) ── */
function renderTraits() {
  const bars = AX.map((ax, i) => traitBar(ax, S.userScores[ax], i === S.traitIdx)).join('');
  return `
  <div class="traits-grid section-gap">
    <div class="card tc-panel">${traitCarouselDesc()}</div>
    <div class="card bars-panel">${bars}</div>
  </div>`;
}

/* ── Detail card HTML ── */
function renderDetailCard() {
  const r = S.results[S.sel];
  const fc = fitColor(r.fit);
  const bars = AX.map(ax => comparisonBars(ax, r.user[ax], r[ax])).join('');
  const about = (r.about || '');
  const rc = 24, c = 2 * Math.PI * rc, f = (r.fit / 100) * c;
  return `
    <div class="card match-card">
      <div class="match-top">
        <div class="fit-display">
          <div class="fit-arc">
            <svg width="56" height="56" viewBox="0 0 56 56">
              <circle cx="28" cy="28" r="${rc}" fill="none" stroke="#E4E7ED" stroke-width="6"/>
              <circle class="js-arc" cx="28" cy="28" r="${rc}" fill="none" stroke="${fc.fill}" stroke-width="6"
                stroke-dasharray="${f} ${c}" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:center"/>
            </svg>
          </div>
          <div class="fit-text">
            <span class="js-fit-pct fit-pct" style="color:${fc.text}">${r.fit}%</span>
            <span class="fit-lbl">相性度</span>
          </div>
        </div>
        <div>
          <div class="js-dept div-dept">${r.dept}</div>
          <div class="js-name div-name">${r.name}</div>
          <div class="js-about div-about">${about}</div>
        </div>
      </div>
      <div class="comp-label">相性の内訳</div>
      ${bars}
    </div>`;
}

/* ── Section 3+4: Match + Browse (side-by-side) ── */
function renderMatchBrowse() {
  const all = S.results;

  const items = all.map((d, i) => {
    const dfc = fitColor(d.fit);
    const on = i === S.sel ? 'on' : '';
    const pressed = i === S.sel ? 'true' : 'false';
    return `<button type="button" class="all-item ${on}" onclick="go('SEL',${i})" aria-pressed="${pressed}">
      <span class="all-rn">${i + 1}</span>
      <div class="all-info">
        <div class="all-name">${d.name}</div>
        <div class="all-dept">${d.dept}</div>
      </div>
      <span class="all-fit" style="color:${dfc.text}">${d.fit}%</span>
    </button>`;
  }).join('');

  return `
  <div class="match-section section-gap">
    <div class="match-section-title">あなたに合う課</div>
    <div class="match-section-sub">5つの軸のプロファイルを比較して相性を算出しています</div>
    <div class="match-browse">
      <div class="all-list all-list--side">${items}</div>
      <div class="detail-col">${renderDetailCard()}</div>
    </div>
    <div class="bottom-actions">
      <button class="btn-share" type="button" onclick="go('SHARE')">結果をシェアする</button>
      <button class="btn-retake" type="button" onclick="go('RETAKE')">もう一度やってみる</button>
    </div>
  </div>`;
}

/* ── Targeted DOM patches ── */
function patchSel() {
  const r = S.results[S.sel];
  const fc = fitColor(r.fit);
  const rc = 24, c = 2 * Math.PI * rc, f = (r.fit / 100) * c;

  // Update header text
  const el = (s) => document.querySelector(s);
  el('.js-dept').textContent = r.dept;
  el('.js-name').textContent = r.name;
  el('.js-about').textContent = r.about || '';
  el('.js-fit-pct').textContent = r.fit + '%';
  el('.js-fit-pct').style.color = fc.text;

  // Update arc
  const arc = el('.js-arc');
  arc.setAttribute('stroke', fc.fill);
  arc.setAttribute('stroke-dasharray', f + ' ' + c);

  // Update dot positions (CSS transition handles animation)
  const dots = document.querySelectorAll('.comp-dot');
  AX.forEach((ax, i) => {
    const uPct = toFill(r.user[ax]) + '%';
    const dPct = toFill(r[ax]) + '%';
    dots[i * 2].style.left = uPct;
    dots[i * 2 + 1].style.left = dPct;
  });

  // Update list highlight
  document.querySelectorAll('.all-item').forEach((el, i) => {
    const isOn = i === S.sel;
    el.classList.toggle('on', isOn);
    el.setAttribute('aria-pressed', isOn ? 'true' : 'false');
  });
}

function patchTrait() {
  const tc = document.querySelector('.tc-panel');
  if (tc) tc.innerHTML = traitCarouselDesc();
  // Update active highlight on bars
  document.querySelectorAll('.trait').forEach((el, i) => {
    const isActive = i === S.traitIdx;
    el.classList.toggle('trait--active', isActive);
    el.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
}

/* ── Assemble ── */
function renderResults() {
  return renderTypeReveal()
    + renderTraits()
    + renderMatchBrowse();
}


/* ── 09-render.js ── */
/* ═══════════════════════ RENDER ═══════════════════════ */

function render() {
  const app = document.getElementById('app');
  if (S.screen === 'welcome')      app.innerHTML = renderWelcome();
  else if (S.screen === 'quiz')    app.innerHTML = renderQuiz();
  else                              app.innerHTML = renderResults();

  window.scrollTo(0, 0);
  manageFocus();
}

function manageFocus() {
  // Move focus to the screen's primary heading so keyboard + screen-reader users
  // know the page changed. Headings get tabindex=-1 to be focusable without a tab stop.
  const target = document.querySelector('h1');
  if (target) {
    target.setAttribute('tabindex', '-1');
    target.focus({ preventScroll: true });
  }
}

restoreFromUrl();
render();

// Hello to whoever's poking around in DevTools.
console.log(

  'font-weight:700; font-size:13px; color:#1C2340;',
  'font-size:11px; color:#6B7280;'
);

</script>
